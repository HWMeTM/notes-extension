<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <span class="title">SIMPLE NOTES</span>
        <span class="badge">LOCAL</span>
    </div>
    
    <div class="notes-container" id="notesList">
        <!-- Notes will be injected here by JS -->
    </div>

    <div class="input-container">
        <input type="text" id="noteInput" placeholder="Type a note (Use 'Title: Body' format)..." autocomplete="off">
    </div>

    <script src="popup.js"></script>
</body>
</html>
